# API del formulario: POST /api/contact → Resend. Resend: wrangler secret put RESEND_API_KEY
name = "carlosmakes-contact"
main = "src/index.js"
compatibility_date = "2024-12-01"
workers_dev = false

# Sin esta ruta, /api/contact lo atiende el hosting estático (Pages) y devuelve 405.
[[routes]]
pattern = "carlosmakes.com/api/contact*"
zone_name = "carlosmakes.com"

# Opcional: rate limit con KV
#   npx wrangler kv namespace create RATE_LIMIT
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "PASTE_ID"
# preview_id = "PASTE_PREVIEW_ID"

[vars]
# Con dominio verificado en Resend puedes poner contacto@carlosmakes.com
FROM_EMAIL = "onboarding@resend.dev"
TO_EMAIL = "hola@carlosmakes.com"

# CORS / dev (opcional)
# CORS_EXTRA = "http://192.168.1.1:3000"
