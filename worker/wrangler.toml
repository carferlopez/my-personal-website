# Configura KV y emails antes de deploy. La API key NUNCA va aquí: solo `wrangler secret put`.
name = "carlosmakes-contact"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Sustituye el id de KV tras: npx wrangler kv namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REEMPLAZA_CON_EL_ID_PRODUCCION"
preview_id = "REEMPLAZA_CON_EL_ID_PREVIEW"

[vars]
FROM_EMAIL = "contacto@carlosmakes.com"
# Caja de entrada donde quieres recibir (visible en el dashboard; no es secreto)
TO_EMAIL = "REEMPLAZA_TU_EMAIL@ejemplo.com"

# Opcional: orígenes extra separados por coma (dev raro)
# CORS_EXTRA = "http://192.168.1.1:3000"

# Tras el primer deploy, en Cloudflare: Workers & Pages → tu worker → Triggers
#   URL: carlosmakes.com  Path: /api/contact  (o subdominio workers.dev para pruebas)
