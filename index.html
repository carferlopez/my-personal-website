<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0; }

  :root {
    --black: #000;
    --white: #fff;
    /* Paleta sitio: naranja puro #FF6600 de fondo, amarillo fluorescente como texto principal, blanco para acentos */
    --page-bg: #FF6600;
    --page-lime: #eeff00;
    --text-primary: var(--page-lime);
    --gray: #a0a070;
    --gray-light: #e5e7eb;
    --gray-mid: #9ca3af;
    --hero-v2-orange: var(--page-lime);
    --hero-v2-violet-bg: var(--page-bg);
    --hero-v2-violet: var(--white);
    --hero-v2-violet-rgb: 255, 255, 255;
    --page-orange: var(--page-lime);
    --page-magenta: var(--page-bg);
    --page-yellow: var(--white);
    /* Mismo margen lateral que .hero-v2-sticky (titular grande); header + .container comparten cifra + safe-area */
    --container-pad-x: 0.5rem;
    --logo-text-inset: calc(var(--container-pad-x) - 0.5rem + 0.375rem);
  }
  @media (min-width: 640px) {
    :root {
      --logo-text-inset: calc(var(--container-pad-x) - 0.6rem + 0.5rem);
    }
  }
  @media (min-width: 768px) {
    :root {
      --container-pad-x: 1rem;
      --logo-text-inset: calc(var(--container-pad-x) - 0.6rem + 0.5rem);
    }
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--page-bg);
    color: var(--page-lime);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  ::selection { background: rgba(238, 255, 0, 0.38); color: var(--black); }

  a { color: inherit; text-decoration: none; }

  button { font-family: inherit; background: none; border: none; cursor: pointer; }
  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--page-lime);
    outline-offset: 3px;
  }

  /* ==================== LAYOUT ==================== */
  /* Sin margin-inline auto: igual que hero-v2 (full-bleed + padding lateral). Centrar aquí corría WORKS/contacto/typewriter vs el titular grande. */
  .container {
    max-width: 72rem;
    margin: 0;
    width: 100%;
    padding-left: max(var(--container-pad-x), env(safe-area-inset-left, 0px));
    padding-right: max(var(--container-pad-x), env(safe-area-inset-right, 0px));
  }

  /* ==================== SITE HEADER (fixed) ==================== */
  .site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding-top: 1.5rem;
    padding-bottom: 0.75rem;
    padding-left: max(var(--container-pad-x), env(safe-area-inset-left, 0px));
    padding-right: max(var(--container-pad-x), env(safe-area-inset-right, 0px));
    color: var(--page-lime);
    background: transparent;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    transition: background 0.35s ease, backdrop-filter 0.35s ease, -webkit-backdrop-filter 0.35s ease, color 0.2s ease;
  }
  .site-header.scrolled {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: rgba(255, 102, 0, 0.9);
  }

  .site-header__inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.5rem;
    width: 100%;
  }
  @media (min-width: 768px) { .site-header__inner { gap: 0.625rem; } }

  /* Cabecera: amarillo fluorescente por defecto, blanco en hover / activo (fondo del sitio en naranja) */
  .site-header .header-top nav a {
    color: var(--page-lime);
  }
  .site-header .header-top nav a:hover {
    background: transparent;
    color: var(--white);
  }
  /* ES/EN: reposo blanco; hover/foco/abierto = bloque entero relleno amarillo fluor, texto negro (legible) */
  .site-header .lang-select__btn {
    color: var(--white);
    background: transparent;
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .site-header .lang-select__btn .lang-select__chev {
    color: inherit;
    opacity: 0.88;
    transition: opacity 0.15s ease;
  }
  .site-header .lang-select__btn:hover,
  .site-header .lang-select__btn:focus-visible,
  .site-header .lang-select.is-open .lang-select__btn {
    background: var(--page-lime);
    color: var(--black);
    -webkit-text-fill-color: var(--black);
  }
  .site-header .lang-select__btn:hover .lang-select__chev,
  .site-header .lang-select__btn:focus-visible .lang-select__chev,
  .site-header .lang-select.is-open .lang-select__btn .lang-select__chev {
    opacity: 1;
  }
  .site-header .lang-select__btn:focus-visible {
    outline: 2px solid var(--black);
    outline-offset: 2px;
  }
  .site-header .hamburger-btn {
    color: var(--page-lime);
  }
  .site-header .hamburger-btn:hover {
    color: var(--white);
  }
  .site-header .lang-select__menu {
    background: var(--page-bg);
    border: 2px solid rgba(238, 255, 0, 0.45);
    color: var(--page-lime);
  }
  .site-header .lang-select__option {
    background: transparent;
    color: var(--page-lime);
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  .site-header .lang-select__option.is-active {
    background: transparent;
    color: var(--white);
  }
  .site-header .lang-select__option:hover,
  .site-header .lang-select__option:focus-visible {
    background: var(--page-lime);
    color: var(--black);
    -webkit-text-fill-color: var(--black);
  }

  .site-header .logo {
    color: var(--white);
    transition: color 0.15s ease, opacity 0.15s ease;
  }
  .site-header .logo .logo-dot {
    color: var(--page-lime);
    transition: color 0.15s ease;
  }
  .site-header .logo:hover {
    color: var(--page-lime);
    opacity: 1;
  }
  .site-header .logo:hover .logo-dot {
    color: var(--white);
  }

  /* ==================== HERO V2 (carlos-site-V2) ==================== */
  .hero-v2-section {
    height: 300vh;
    position: relative;
    background: var(--hero-v2-violet-bg);
    color: var(--page-lime);
  }
  .hero-v2-section.hero-v2-section--static {
    height: auto;
    min-height: 100svh;
  }

  /* Último tramo del hero: fundido al color de página antes de la presentación */
  .hero-v2-end-fade {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: var(--page-bg);
    pointer-events: none;
    opacity: 0;
  }
  .hero-v2-section--static .hero-v2-end-fade {
    display: none;
  }

  .hero-v2-sticky {
    position: sticky;
    top: 0;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    min-height: 100svh;
    height: 100svh;
    max-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: stretch;
    overflow: hidden;
    color: var(--page-lime);
    /* Reserva bajo el header fijo para que el titular no invada el logo */
    padding:
      max(5rem, calc(env(safe-area-inset-top, 0px) + 4.75rem))
      max(var(--container-pad-x), env(safe-area-inset-right, 0px))
      max(0.75rem, env(safe-area-inset-bottom, 0px))
      max(var(--container-pad-x), env(safe-area-inset-left, 0px));
  }
  @media (min-width: 768px) {
    .hero-v2-sticky {
      padding:
        max(5.25rem, calc(env(safe-area-inset-top, 0px) + 5rem))
        max(var(--container-pad-x), env(safe-area-inset-right, 0px))
        max(1rem, env(safe-area-inset-bottom, 0px))
        max(var(--container-pad-x), env(safe-area-inset-left, 0px));
    }
  }

  .hero-v2-title {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    flex-shrink: 0;
    margin: 0;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    /* Interlineado un poco más abierto; sigue cabiendo bajo el logo */
    line-height: 0.84;
    gap: 0;
    will-change: transform;
    transform-origin: 50% 50%;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    color: var(--page-lime) !important;
    -webkit-text-fill-color: var(--page-lime) !important;
  }
  /* Móvil: titular cerca del logo (sin centrar en toda la pantalla; proporción más parecida al desktop) */
  @media (max-width: 639px) {
    .hero-v2-sticky {
      justify-content: flex-start;
      align-items: stretch;
      /* Más aire bajo el logo / nombre para que el titular no quede pegado */
      padding-top: max(5.15rem, calc(env(safe-area-inset-top, 0px) + 4.65rem));
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom, 0px));
    }
    .hero-v2-title {
      flex: 0 1 auto;
      min-height: 0;
      justify-content: flex-start;
      gap: 0;
      margin-top: clamp(0.35rem, 2vw, 1rem);
    }
  }

  .hero-v2-line {
    display: block;
    white-space: nowrap;
    color: var(--page-lime) !important;
    -webkit-text-fill-color: var(--page-lime) !important;
    line-height: 0.84;
    margin: 0;
    padding: 0;
  }

  /* Por encima del color heredado de .hero-v2-section (p. ej. con capas/GPU) */
  #heroV2Title,
  #heroV2Title.hero-v2-title,
  #heroV2Title .hero-v2-line {
    color: var(--page-lime) !important;
    -webkit-text-fill-color: var(--page-lime) !important;
  }
  #heroV2Title .hero-v2-amp {
    color: var(--white) !important;
    -webkit-text-fill-color: var(--white) !important;
  }
  #heroV2Title .hero-v2-line:nth-child(1) {
    color: var(--white) !important;
    -webkit-text-fill-color: var(--white) !important;
  }
  #heroV2Title .hero-v2-line:nth-child(3) .hero-v2-violet {
    color: var(--white) !important;
    -webkit-text-fill-color: var(--white) !important;
  }
  #heroV2Title .hero-v2-line:nth-child(4) {
    color: var(--page-lime) !important;
    -webkit-text-fill-color: var(--page-lime) !important;
  }
  #heroV2Title .hero-v2-line:nth-child(4) .hero-v2-dot {
    color: var(--white) !important;
    -webkit-text-fill-color: var(--white) !important;
  }

  /* Presentación: mismo fondo que la página; titulares en lima / blanco */
  .intro-hero {
    position: relative;
    background: var(--page-bg);
    color: var(--page-lime);
    padding-top: 5rem;
    padding-bottom: clamp(10rem, 32vh, 22rem);
    overflow-x: hidden;
  }
  @media (min-width: 768px) { .intro-hero { padding-top: 6rem; } }

  .intro-panels {
    display: block;
  }

  /* Sin JS / reduced-motion: tres bloques en columna. Con .intro-hero--active: un solo viewport, rotación por scroll */
  .intro-stage {
    display: flex;
    flex-direction: column;
    gap: clamp(5rem, 14vh, 11rem);
    position: relative;
  }

  .intro-panel {
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-block: clamp(3.5rem, 10vw, 8rem);
    border-bottom: 1px solid rgba(238, 255, 0, 0.12);
    overflow: visible;
  }
  .intro-panel:last-child {
    border-bottom: none;
  }

  .intro-hero--active .intro-stage {
    display: block;
    min-height: 100vh;
    min-height: 100dvh;
    gap: 0;
  }

  .intro-hero--active .intro-panel {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    width: 100%;
    box-sizing: border-box;
    border-bottom: none;
  }

  .intro-hero--active .intro-panel--0 {
    z-index: 1;
  }
  .intro-hero--active .intro-panel--1 {
    z-index: 2;
  }
  .intro-hero--active .intro-panel--2 {
    z-index: 3;
  }

  .intro-panel__grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: clamp(2rem, 6vw, 4.5rem);
    align-items: center;
    width: 100%;
    overflow: visible;
  }

  .intro-panel__copy {
    position: relative;
    z-index: 2;
    margin-inline-start: calc(var(--logo-text-inset) - var(--container-pad-x));
    /* Bloque ~cuadrado: líneas cortas (ch) + más tipografía abajo */
    max-width: min(26ch, 34rem, 92vw);
    will-change: transform;
  }

  .intro-panel__headline {
    margin: 0;
    font-size: clamp(1.45rem, 4.35vw, 2.95rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.1;
    text-transform: uppercase;
    text-wrap: balance;
    word-break: normal;
    overflow-wrap: normal;
    hyphens: none;
  }
  @media (min-width: 768px) {
    .intro-panel__headline { font-size: clamp(1.7rem, 3.4vw, 3.25rem); }
  }
  /* Tablet: mismo criterio cuadrado, escala intermedia */
  @media (min-width: 640px) and (max-width: 899px) {
    .intro-panel__copy {
      max-width: min(24ch, 30rem, 88vw);
    }
    .intro-panel__headline {
      font-size: clamp(1.85rem, 3.6vw, 2.85rem);
      line-height: 1.11;
    }
  }
  /* Escritorio: tipografía grande en columna tipo bloque (relación alto/ancho cercana) */
  @media (min-width: 900px) {
    .intro-panel__copy {
      max-width: min(22ch, 28rem, 36vw);
    }
    .intro-panel__headline {
      font-size: clamp(2.2rem, 3.05vw, 3.85rem);
      line-height: 1.1;
      letter-spacing: -0.042em;
    }
  }

  /* Línea 2 en blanco; 1 y 3 en lima; puntos / ;) con reglas de sufijo */
  .intro-panel--0 .intro-panel__headline {
    color: var(--page-lime);
  }
  .intro-panel--1 .intro-panel__headline {
    color: var(--white);
  }
  .intro-panel--2 .intro-panel__headline {
    color: var(--page-lime);
  }
  /* Puntos y ;) fuera del color principal del bloque */
  .intro-panel--0 .intro-line__suffix--period {
    color: var(--white);
  }
  .intro-panel--1 .intro-line__suffix--period {
    color: var(--page-lime);
  }
  .intro-panel--2 .intro-line__suffix--wink {
    color: var(--white);
  }

  .intro-line__suffix {
    color: rgba(255, 255, 255, 0.55);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 1rem;
    min-width: 0;
  }
  .header-top .logo {
    flex: 0 1 auto;
    min-width: 0;
  }
  .header-top .header-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-left: auto;
    flex-shrink: 0;
  }
  @media (min-width: 640px) { .header-top .header-actions { gap: 0.65rem; } }
  @media (min-width: 768px) { .header-top .header-actions { gap: 0.85rem; } }

  .logo {
    display: inline-block;
    font-size: 1.3rem;
    font-weight: 900;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: -0.05em;
    text-decoration: none;
    color: inherit;
    padding: 0.375rem 0.5rem;
    margin: -0.375rem -0.5rem;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  @media (min-width: 640px) { .logo { padding: 0.5rem 0.6rem; margin: -0.5rem -0.6rem; } }
  @media (min-width: 640px) { .logo { font-size: 1.45rem; } }
  @media (min-width: 768px) { .logo { font-size: 1.75rem; } }
  .logo .logo-dot {
    color: var(--hero-v2-orange);
  }

  .header-top nav {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-inline-start: 0.75rem;
    margin-inline-end: 0;
  }
  @media (min-width: 640px) {
    .header-top nav {
      gap: 1rem;
      margin-inline-start: 1.25rem;
      margin-inline-end: 0;
    }
  }
  @media (min-width: 768px) {
    .header-top nav {
      gap: 1.25rem;
      margin-inline-start: 1.5rem;
      margin-inline-end: 0;
    }
  }

  .header-top nav a {
    padding: 0.375rem;
    min-width: 2rem;
    min-height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: inherit;
    transition: color 0.15s ease;
  }
  @media (min-width: 640px) { .header-top nav a { padding: 0.5rem; } }
  .header-top nav a:hover {
    background: transparent;
    color: var(--white);
  }
  .header-top nav svg {
    width: 1rem;
    height: 1rem;
    display: block;
    flex-shrink: 0;
    color: inherit;
  }
  @media (min-width: 640px) { .header-top nav svg { width: 1.25rem; height: 1.25rem; } }
  @media (min-width: 768px) { .header-top nav svg { width: 1.5rem; height: 1.5rem; } }
  /* Asegurar inversión: currentColor pasa a blanco; trazos y rellenables siguen al icono */
  .header-top nav a:hover svg * {
    stroke: currentColor;
  }
  .header-top nav a:hover svg [fill="none"] {
    fill: none;
  }
  .header-top nav a:hover svg path:not([fill="none"]) {
    fill: currentColor;
  }

  .lang-select {
    position: relative;
  }
  .lang-select__btn {
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.375rem 0.45rem;
    transition: color 0.15s ease;
    white-space: nowrap;
    color: inherit;
  }
  @media (min-width: 640px) { .lang-select__btn { font-size: 0.75rem; padding: 0.5rem 0.55rem; gap: 0.35rem; } }
  .lang-select__btn:hover { background: transparent; color: var(--page-lime); }
  .lang-select__current {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
  }
  .lang-select__flag {
    font-size: 0.75rem;
    line-height: 1;
  }
  @media (min-width: 640px) { .lang-select__flag { font-size: 0.875rem; } }
  .lang-select__chev {
    display: inline-block;
    font-size: 0.65em;
    line-height: 1;
    opacity: 0.75;
    margin-left: 0.1rem;
    transition: transform 0.15s ease;
  }
  .lang-select.is-open .lang-select__chev {
    transform: rotate(180deg);
  }
  .lang-select__menu {
    position: absolute;
    top: calc(100% + 0.35rem);
    right: 0;
    min-width: 7.5rem;
    padding: 0.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    background: var(--page-bg);
    color: var(--page-lime);
    border: 2px solid rgba(238, 255, 0, 0.45);
    z-index: 120;
  }
  /* El atributo hidden debe ganar a display:flex (si no, el menú se ve siempre) */
  .lang-select__menu[hidden] {
    display: none !important;
  }
  .lang-select__option {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    width: 100%;
    text-align: left;
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.45rem 0.55rem;
    transition: color 0.15s ease;
    background: transparent;
    color: var(--page-lime);
  }
  @media (min-width: 640px) { .lang-select__option { font-size: 0.75rem; } }
  .lang-select__option:hover {
    background: transparent;
    color: var(--page-lime);
  }
  .lang-select__option.is-active {
    background: transparent;
    color: var(--white);
  }
  .lang-select__option .flag {
    font-size: 0.875rem;
    line-height: 1;
  }

  // ============================================
  // Intro: tres líneas al scroll (GSAP ScrollTrigger)
  // ============================================
  let introPanelTimelines = [];

  function killIntroLinesScrollAnimation() {
    const introRoot = document.getElementById('presentacion');
    if (introRoot) introRoot.classList.remove('intro-hero--active');
    introPanelTimelines.forEach((tl) => tl.kill());
    introPanelTimelines = [];
    if (typeof gsap !== 'undefined' && introRoot) {
      introRoot.querySelectorAll('.intro-panel__copy').forEach((el) => {
        gsap.killTweensOf(el);
        gsap.set(el, { clearProps: 'transform' });
      });
      introRoot.querySelectorAll('.intro-panel').forEach((el) => {
        gsap.killTweensOf(el);
        gsap.set(el, { clearProps: 'opacity,visibility' });
      });
    }
    ['introLine0', 'introLine1', 'introLine2'].forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.style.removeProperty('color');
        el.querySelectorAll('.intro-line__suffix').forEach((s) => {
          s.style.removeProperty('color');
        });
      }
    });
  }

  /** Sufijos `.` y `;)` en blanco (clase intro-line__suffix). */
  function fillIntroLineElement(el, fullWord) {
    if (!el) return;
    el.replaceChildren();
    if (!fullWord) return;

    if (fullWord.endsWith(' ;')) {
      const baseLen = fullWord.length - 2;
      el.append(document.createTextNode(fullWord.slice(0, baseLen)));
      const suffix = document.createElement('span');
      suffix.className = 'intro-line__suffix intro-line__suffix--semi';
      suffix.textContent = ' ;';
      el.append(suffix);
      return;
    }

    if (fullWord.endsWith(';)')) {
      const baseLen = fullWord.length - 2;
      el.append(document.createTextNode(fullWord.slice(0, baseLen)));
      const suffix = document.createElement('span');
      suffix.className = 'intro-line__suffix intro-line__suffix--wink';
      suffix.textContent = ';)';
      el.append(suffix);
      return;
    }

    if (fullWord.endsWith('.')) {
      const baseLen = fullWord.length - 1;
      el.append(document.createTextNode(fullWord.slice(0, baseLen)));
      const suffix = document.createElement('span');
      suffix.className = 'intro-line__suffix intro-line__suffix--period';
      suffix.textContent = '.';
      el.append(suffix);
      return;
    }

    el.textContent = fullWord;
  }

  function fillIntroLinesFromLang() {
    const words = t[lang].typewriter;
    if (!words || words.length < 3) return;
    fillIntroLineElement(document.getElementById('introLine0'), words[0]);
    fillIntroLineElement(document.getElementById('introLine1'), words[1]);
    fillIntroLineElement(document.getElementById('introLine2'), words[2]);
  }

  function refreshIntroLinesAfterLangChange() {
    fillIntroLinesFromLang();
    killIntroLinesScrollAnimation();
    syncViewportAnimationMode();
  }

  function setupIntroLinesScrollAnimation() {
    const introRoot = document.getElementById('presentacion');
    if (!introRoot) return;

    killIntroLinesScrollAnimation();
    fillIntroLinesFromLang();

    const panels = introRoot.querySelectorAll('.intro-panel[data-intro-panel]');
    if (panels.length < 3) return;

    const reduceIntro = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceIntro) {
      panels.forEach((panel) => {
        const copy = panel.querySelector('.intro-panel__copy');
        if (copy) {
          copy.style.opacity = '1';
          copy.style.transform = 'none';
        }
      });
      return;
    }

    if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') {
      panels.forEach((panel) => {
        const copy = panel.querySelector('.intro-panel__copy');
        if (copy) {
          copy.style.opacity = '1';
          copy.style.transform = 'none';
        }
      });
      return;
    }

    gsap.registerPlugin(ScrollTrigger);

    introRoot.classList.add('intro-hero--active');

    const wide = window.matchMedia('(min-width: 900px)').matches;
    const narrowMobile = window.matchMedia('(max-width: 639px)').matches;
    /* Móvil: escala suave; escritorio: zoom moderado (columna ya es estrecha, evita barras ultra anchas) */
    const endScale = wide ? 2.4 : narrowMobile ? 1.12 : 2.1;
    const startCopy = wide
      ? { x: '-26vw', y: 0, opacity: 1, scale: 1 }
      : { x: 0, y: 0, opacity: 0, scale: 0.94 };

    const SEG = 1;
    /* Móvil: un poco más de scroll por frase = tiempo de lectura con el texto ya fijo */
    const scrollPerSegmentVh = narrowMobile ? 2.85 : wide ? 3.35 : 2.72;
    const totalPinScroll = () =>
      Math.round(window.innerHeight * scrollPerSegmentVh * 3);

    const copyEls = [];
    panels.forEach((panel) => {
      const copy = panel.querySelector('.intro-panel__copy');
      if (!copy) return;
      copyEls.push(copy);
      gsap.set(copy, {
        transformOrigin: wide ? 'left center' : 'center center',
        scale: startCopy.scale,
        x: startCopy.x,
        y: startCopy.y,
        opacity: startCopy.opacity,
      });
    });

    if (copyEls.length !== 3) {
      introRoot.classList.remove('intro-hero--active');
      return;
    }

    gsap.set(panels[0], { autoAlpha: 1 });
    gsap.set([panels[1], panels[2]], { autoAlpha: 0 });

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: introRoot,
        start: 'top top',
        end: () => '+=' + totalPinScroll(),
        pin: true,
        scrub: true,
        invalidateOnRefresh: true,
        anticipatePin: 1,
      },
    });

    const introEase = 'none';
    const panelFadeDur = 0.26;
    const panelFadeEase = 'power2.inOut';
    /* Salida más larga y suave (antes ~0.048 era casi un parpadeo al hacer scrub) */
    const exitDur = 0.175;
    const mergeDur = SEG - exitDur;
    const nextRevealOffset = exitDur * 0.22;

    function nextPanelRevealAt(segIndex) {
      return segIndex * SEG + mergeDur + nextRevealOffset;
    }

    function addSegment(i, t0) {
      const copy = copyEls[i];
      if (!copy) return;

      const motionDur = i < 2 ? mergeDur : SEG;

      if (narrowMobile) {
        const enterDur = Math.min(0.3, motionDur * 0.34);
        const holdDur = Math.max(0, motionDur - enterDur);
        tl.fromTo(
          copy,
          {
            scale: startCopy.scale,
            x: startCopy.x,
            y: startCopy.y,
            opacity: startCopy.opacity,
          },
          {
            scale: endScale,
            x: 0,
            y: 0,
            opacity: 1,
            ease: introEase,
            duration: enterDur,
          },
          t0
        );
        tl.to(
          copy,
          {
            scale: endScale,
            x: 0,
            y: 0,
            opacity: 1,
            ease: 'none',
            duration: holdDur,
          },
          t0 + enterDur
        );
      } else {
        tl.fromTo(
          copy,
          {
            scale: startCopy.scale,
            x: startCopy.x,
            y: startCopy.y,
            opacity: startCopy.opacity,
          },
          {
            scale: endScale,
            x: 0,
            y: 0,
            opacity: 1,
            ease: introEase,
            duration: motionDur,
          },
          t0
        );
      }

      if (i < 2) {
        const exit = wide
          ? {
              x: '-72vw',
              y: 0,
              opacity: 0,
              scale: endScale * 0.94,
            }
          : {
              x: 0,
              y: '-14vh',
              opacity: 0,
              scale: endScale * 0.88,
            };
        tl.to(
          copy,
          {
            x: exit.x,
            y: exit.y,
            opacity: exit.opacity,
            scale: exit.scale,
            ease: 'sine.inOut',
            duration: exitDur,
          },
          t0 + mergeDur
        );
      }
    }

    addSegment(0, 0);

    const fade1At = nextPanelRevealAt(0);
    tl.to(panels[0], { autoAlpha: 0, ease: panelFadeEase, duration: panelFadeDur }, fade1At);
    tl.fromTo(
      panels[1],
      { autoAlpha: 0 },
      { autoAlpha: 1, ease: panelFadeEase, duration: panelFadeDur },
      fade1At
    );
    addSegment(1, SEG);

    const fade2At = nextPanelRevealAt(1);
    tl.to(panels[1], { autoAlpha: 0, ease: panelFadeEase, duration: panelFadeDur }, fade2At);
    tl.fromTo(
      panels[2],
      { autoAlpha: 0 },
      { autoAlpha: 1, ease: panelFadeEase, duration: panelFadeDur },
      fade2At
    );
    addSegment(2, SEG * 2);

    introPanelTimelines.push(tl);
  }

  function killHeroScrollAnimation() {
    const hero = document.querySelector('.hero-v2-section');
    if (typeof gsap !== 'undefined') {
      gsap.killTweensOf('#heroV2Title');
      gsap.killTweensOf('.hero-v2-end-fade');
      gsap.set('#heroV2Title', { clearProps: 'transform' });
    }
    if (typeof ScrollTrigger !== 'undefined' && hero) {
      ScrollTrigger.getAll().forEach((st) => {
        if (st.trigger === hero) st.kill();
      });
    }
  }

  function initHeroScrollAnimation() {
    if (reduceMotion) return;
    if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
    if (window.matchMedia('(max-width: 639px)').matches) return;
    gsap.registerPlugin(ScrollTrigger);
    killHeroScrollAnimation();
    const heroScroll = {
      trigger: '.hero-v2-section',
      start: 'top top',
      end: 'bottom top',
      scrub: 0.8,
    };
    const heroTl = gsap.timeline({ scrollTrigger: heroScroll });
    heroTl.fromTo(
      '#heroV2Title',
      { scale: 1, rotationZ: 0 },
      { scale: 7, rotationZ: 22, ease: 'none', duration: 1 },
      0
    );
    heroTl.fromTo(
      '.hero-v2-end-fade',
      { opacity: 0 },
      { opacity: 1, ease: 'none', duration: 0.26 },
      0.74
    );
  }

  function syncViewportAnimationMode() {
    const hero = document.querySelector('.hero-v2-section');
    const mob =
      typeof window.matchMedia !== 'undefined' &&
      window.matchMedia('(max-width: 639px)').matches;
    if (hero) {
      if (mob || reduceMotion) {
        hero.classList.add('hero-v2-section--static');
        killHeroScrollAnimation();
      } else {
        hero.classList.remove('hero-v2-section--static');
        initHeroScrollAnimation();
      }
    }
    setupIntroLinesScrollAnimation();
    fitHeroV2Lines();
    if (typeof lang !== 'undefined' && typeof t !== 'undefined' && t[lang] && t[lang].projectsTitle) {
      renderProjectsTickersBelt();
      queueMicrotask(() => { requestAnimationFrame(syncWorksFontToHero); });
    }
    if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();
  }

  function setProjectsTitleStack(text) {
    const h2 = document.getElementById('projectsTitle');
    if (!h2 || !text) return;
    const sr = h2.querySelector('.projects-title-sr');
    if (sr) sr.textContent = text;
    renderProjectsTickersBelt();
    queueMicrotask(() => { requestAnimationFrame(syncWorksFontToHero); });
  }

  function buildWorksTickerChunks(wordHtml) {
    const n = 18;
    const parts = [];
    for (let i = 0; i < n; i++) {
      const orange = i % 2 === 0;
      parts.push(
        '<span class="projects-ticker__word ' +
        (orange ? 'projects-ticker__word--orange' : 'projects-ticker__word--black') +
        '">' +
        wordHtml +
        '</span>'
      );
    }
    return parts.join('');
  }

  const PROJECTS_TICKER_ROWS = 7;

  /** Siete carriles horizontales; filas impares en sentido contrario (CSS .projects-ticker__track--rev). */
  function renderProjectsTickersBelt() {
    const belt = document.getElementById('projectsTickersBelt');
    if (!belt) return;
    const raw = (t[lang] && t[lang].projectsTitle) ? String(t[lang].projectsTitle) : 'WORKS';
    const word = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const chunk = '<span class="projects-ticker__chunk">' + buildWorksTickerChunks(word) + '</span>';
    const reduce =
      typeof window.matchMedia !== 'undefined' &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const inner = reduce ? chunk : chunk + chunk;
    belt.replaceChildren();
    for (let i = 0; i < PROJECTS_TICKER_ROWS; i++) {
      const row = document.createElement('div');
      row.className = 'projects-ticker projects-ticker--belt-row';
      const vp = document.createElement('div');
      vp.className = 'projects-ticker__viewport';
      const track = document.createElement('div');
      track.className =
        'projects-ticker__track' +
        (i % 2 === 1 ? ' projects-ticker__track--rev' : '');
      track.id = 'projectsTickerTrack' + i;
      track.innerHTML = inner;
      vp.appendChild(track);
      row.appendChild(vp);
      belt.appendChild(row);
    }
  }

  function syncWorksFontToHero() {
    const tracks = document.querySelectorAll('#projectsTickersBelt .projects-ticker__track');
    if (!tracks.length) return;

    if (window.matchMedia('(max-width: 639px)').matches) {
      const container = document.querySelector('#proyectos .projects-works-inner');
      const W = container ? container.offsetWidth : document.body.clientWidth;
      if (W < 16) {
        tracks.forEach((tr) => tr.style.removeProperty('font-size'));
        return;
      }
      const ref = tracks[0];
      let lo = 8, hi = 800;
      for (let i = 0; i < 42; i++) {
        const mid = (lo + hi) * 0.5;
        ref.style.fontSize = mid + 'px';
        if (ref.scrollWidth <= W + 1) lo = mid;
        else hi = mid;
      }
      const fs = lo + 'px';
      tracks.forEach((tr) => { tr.style.fontSize = fs; });
      return;
    }

    tracks.forEach((tr) => tr.style.removeProperty('font-size'));

    const line = document.querySelector('#heroV2Title .hero-v2-line');
    if (!line) return;
    let fs = line.style.fontSize;
    if (!fs) fs = getComputedStyle(line).fontSize;
    let fsPx = parseFloat(fs);
    if (!Number.isFinite(fsPx) || fsPx <= 0) return;
    const synced = (fsPx * 0.853) + 'px';
    tracks.forEach((tr) => { tr.style.fontSize = synced; });
  }

  // ============================================
  // Idioma
  // ============================================
  function applyLang() {
    const d = t[lang];
    document.documentElement.lang = lang;
    try { localStorage.setItem('carlosmakes_lang', lang); } catch (e) {}
    const logoLink = document.getElementById('siteLogo');
    if (logoLink && d.siteLogoAria) logoLink.setAttribute('aria-label', d.siteLogoAria);
    const introH = document.getElementById('introHeading');
    if (introH && d.introHeadingLabel) introH.textContent = d.introHeadingLabel;
    document.getElementById('contactTitle').textContent = d.contactTitle;
    document.getElementById('contactMark').textContent = d.contactMark;
    document.getElementById('contactSub').textContent = d.contactSub;
    const contactAltL = document.getElementById('contactAltLabel');
    if (contactAltL && d.contactAltLabel) contactAltL.textContent = d.contactAltLabel;
    setProjectsTitleStack(d.projectsTitle);

    const langSelCur = document.getElementById('langSelectCurrent');
    const langSelBtn = document.getElementById('langSelectBtn');
    if (langSelCur) {
      langSelCur.innerHTML = lang === 'es'
        ? '<span class="lang-select__flag" aria-hidden="true">🇪🇸</span><span class="lang-select__code">ES</span>'
        : '<span class="lang-select__flag" aria-hidden="true">🇺🇸</span><span class="lang-select__code">EN</span>';
    }
    if (langSelBtn) langSelBtn.setAttribute('aria-label', d.langMenuAria);
    document.querySelectorAll('.lang-select__option').forEach((el) => {
      el.classList.toggle('is-active', el.dataset.lang === lang);
    });

    const nlInput = document.getElementById('nl-email');
    if (nlInput && d.contactEmailPh) nlInput.placeholder = d.contactEmailPh;
    const nlSubmit = document.getElementById('nlSubmit');
    if (nlSubmit) nlSubmit.textContent = d.contactBtnLabel;
    const divider = document.getElementById('contactDividerText');
    if (divider) divider.textContent = d.contactDivider;
    const lname = document.getElementById('label-cf-name');
    if (lname) lname.textContent = d.contactFormName;
    const lem = document.getElementById('label-cf-email');
    if (lem) lem.textContent = d.contactFormEmail;
    const ltop = document.getElementById('label-cf-topic');
    if (ltop) ltop.textContent = d.contactFormTopic;
    const lmsg = document.getElementById('label-cf-message');
    if (lmsg) lmsg.textContent = d.contactFormMessage;
    const tph = document.getElementById('cf-topic-placeholder');
    if (tph) tph.textContent = d.contactFormTopicPh;
    const o1 = document.getElementById('opt-cf-colaboracion');
    if (o1) o1.textContent = d.contactTopicColab;
    const o2 = document.getElementById('opt-cf-proyecto');
    if (o2) o2.textContent = d.contactTopicProyecto;
    const o3 = document.getElementById('opt-cf-consulta');
    if (o3) o3.textContent = d.contactTopicConsulta;
    const o4 = document.getElementById('opt-cf-otro');
    if (o4) o4.textContent = d.contactTopicOtro;
    const csub = document.getElementById('contactFormSubmit');
    if (csub && csub.type === 'submit') csub.textContent = d.contactFormSend;
    fillIntroLinesFromLang();
  }

  function getContactFormEndpoint() {
    try {
      if (typeof location !== 'undefined' && location.protocol && location.protocol !== 'file:') {
        return location.origin + '/api/contact';
      }
    } catch (e) {}
    return 'https://carlosmakes.com/api/contact';
  }

  function initContactForm() {
    const form = document.getElementById('contactForm');
    if (!form) return;
    const st = document.getElementById('cf-started-at');
    if (st) st.value = String(Date.now());
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const d = t[lang];
      const status = document.getElementById('contactFormStatus');
      const btn = document.getElementById('contactFormSubmit');
      const block = document.getElementById('contactFormBlock');
      const done = document.getElementById('contactFormSuccess');
      if (!status || !btn || !block || !done) return;
      status.hidden = true;
      status.textContent = '';
      btn.disabled = true;
      btn.textContent = d.contactFormSending;
      try {
        const payload = {
          name: document.getElementById('cf-name').value.trim(),
          email: document.getElementById('cf-email').value.trim(),
          topic: document.getElementById('cf-topic').value,
          message: document.getElementById('cf-message').value,
          _gotcha: document.getElementById('cf-gotcha').value,
          startedAt: (st && st.value) || String(Date.now()),
        };
        const r = await fetch(getContactFormEndpoint(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept-Language': lang === 'en' ? 'en' : 'es' },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => ({}));
        if (r.status === 200 && j.ok) {
          const cfin = document.getElementById('contactFormSuccessText');
          if (cfin) {
            const msgs = t[lang].contactFormSuccess;
            cfin.textContent = Array.isArray(msgs) ? msgs[Math.floor(Math.random() * msgs.length)] : msgs;
          }
          block.hidden = true;
          done.hidden = false;
          if (st) st.value = String(Date.now());
          return;
        }
        status.textContent = r.status === 429 ? d.contactFormErr429
          : (j?.details?.[0]?.message || d.contactFormErrGeneric);
        status.hidden = false;
      } catch {
        status.textContent = t[lang].contactFormErrGeneric;
        status.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = t[lang].contactFormSend;
      }
    });
  }

  function initNewsletterForm() {
    const form = document.getElementById('newsletterForm');
    if (!form) return;
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = encodeURIComponent(document.getElementById('nl-email').value.trim());
      window.open('https://carlosmakes.substack.com/?email=' + email, '_blank', 'noopener,noreferrer');
    });
  }

  function setLangMenuOpen(open) {
    const root = document.getElementById('langSelect');
    const btn = document.getElementById('langSelectBtn');
    const menu = document.getElementById('langSelectMenu');
    if (!root || !btn || !menu) return;
    root.classList.toggle('is-open', open);
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    menu.hidden = !open;
  }

  function initLangSelect() {
    const root = document.getElementById('langSelect');
    const btn = document.getElementById('langSelectBtn');
    const menu = document.getElementById('langSelectMenu');
    if (!root || !btn || !menu) return;

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      setLangMenuOpen(!root.classList.contains('is-open'));
    });
    menu.querySelectorAll('.lang-select__option').forEach((opt) => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const next = opt.getAttribute('data-lang');
        if (next === 'es' || next === 'en') {
          if (next !== lang) {
            lang = next;
            applyLang();
            refreshIntroLinesAfterLangChange();
          }
        }
        setLangMenuOpen(false);
      });
    });
    document.addEventListener('click', (e) => {
      if (!root.contains(e.target)) setLangMenuOpen(false);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') setLangMenuOpen(false);
    });
  }

  // ============================================
  // Hamburguesa móvil
  // ============================================
  function initHamburger() {
    const btn = document.getElementById('hamburgerBtn');
    const header = document.getElementById('siteHeader');
    const actions = document.getElementById('headerActions');
    if (!btn || !header) return;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = header.classList.toggle('nav-open');
      btn.setAttribute('aria-expanded', String(isOpen));
    });
    document.addEventListener('click', (e) => {
      if (!header.classList.contains('nav-open')) return;
      if (!header.contains(e.target)) {
        header.classList.remove('nav-open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
    if (actions) {
      actions.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' || e.target.closest('a')) {
          header.classList.remove('nav-open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });
    }
  }

  // ============================================
  // Init
  // ============================================
  initLangSelect();
  applyLang();
  initContactForm();
  initNewsletterForm();
  initHamburger();

  // Hero V2: tipografía fluida + zoom al scroll (carlos-site-V2)
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function fitHeroV2Lines() {
    const sticky = document.querySelector('.hero-v2-sticky');
    const title = document.getElementById('heroV2Title');
    if (!sticky || !title) return;
    const lines = title.querySelectorAll('.hero-v2-line');
    if (!lines.length) return;
    const cs = getComputedStyle(sticky);
    const W = title.offsetWidth;
    const H = sticky.clientHeight
      - parseFloat(cs.paddingTop)
      - parseFloat(cs.paddingBottom);
    if (W < 16 || H < 16) return;

    const isMobilePortrait = window.innerWidth < 640 && window.innerHeight > window.innerWidth;

    if (isMobilePortrait) {
      /* Móvil portrait: cada línea se escala de forma independiente al ancho completo.
         El CSS distribuye las líneas para llenar el alto con justify-content: space-between. */
      lines.forEach((line) => {
        let lo = 4, hi = 600;
        for (let iter = 0; iter < 42; iter++) {
          const mid = (lo + hi) * 0.5;
          line.style.fontSize = mid + 'px';
          if (line.scrollWidth <= W + 1) lo = mid;
          else hi = mid;
        }
        line.style.fontSize = lo + 'px';
      });
    } else {
      /* Desktop y landscape: escala uniforme que cabe en ancho × alto */
      const constrainHeight = window.innerWidth >= 768;
      let lo = 4, hi = 800;
      for (let iter = 0; iter < 42; iter++) {
        const mid = (lo + hi) * 0.5;
        lines.forEach((line) => { line.style.fontSize = mid + 'px'; });
        const maxW = Math.max(...Array.from(lines, (l) => l.scrollWidth));
        const totH = title.offsetHeight;
        if (maxW <= W + 1 && (!constrainHeight || totH <= H + 1)) lo = mid;
        else hi = mid;
      }
      const best = lo;
      lines.forEach((line) => { line.style.fontSize = best + 'px'; });
    }
    syncWorksFontToHero();
  }

  function updateHeaderTheme() {
    const hdr = document.getElementById('siteHeader');
    if (!hdr) return;
    hdr.classList.toggle('scrolled', window.scrollY > 8);
    hdr.classList.remove('site-header--on-light');
  }

  window.addEventListener('scroll', () => requestAnimationFrame(updateHeaderTheme), { passive: true });
  window.addEventListener('resize', () => {
    updateHeaderTheme();
    syncViewportAnimationMode();
  });
  window.addEventListener('load', () => {
    syncViewportAnimationMode();
  });
  updateHeaderTheme();

  syncViewportAnimationMode();
</script>
