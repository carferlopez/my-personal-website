<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encestar — carlosmakes.com</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }
  a { color: #9ca3af; text-decoration: none; }
  a:hover { color: #fff; }
  .top {
    width: 100%;
    max-width: 42rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 0.875rem;
    font-weight: 700;
  }
  .top a.back { color: #ef4444; }
  .top a.back:hover { color: #fff; }
  h1 {
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .hint {
    text-align: center;
    color: #9ca3af;
    font-size: 0.875rem;
    max-width: 28rem;
    margin-bottom: 1rem;
    line-height: 1.45;
  }
  .score {
    font-size: 2rem;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    margin-bottom: 0.5rem;
  }
  .bar-wrap {
    width: min(100%, 36rem);
    height: 6px;
    background: #1f2937;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    width: 0%;
    background: #ef4444;
    transition: width 0.05s linear;
  }
  .canvas-wrap {
    width: 100%;
    max-width: 42rem;
    border: 3px solid #fff;
    background: #0a0a0a;
  }
  canvas { display: block; width: 100%; height: auto; cursor: pointer; }
  .lang {
    margin-top: 1.25rem;
    font-size: 0.75rem;
    color: #6b7280;
  }
  .lang a { color: #9ca3af; }
  .lang a:hover { color: #ef4444; }
</style>
</head>
<body>
  <div class="top">
    <a class="back" id="backLink" href="index.html">← <span id="backLabel">Inicio</span></a>
    <span id="subtle">carlosmakes</span>
  </div>
  <h1 id="gameTitle">ENCESTAR</h1>
  <p class="hint" id="gameHint">Mantén para acumular fuerza; suelta para lanzar. Un toque corto tira suave, cuanto más mantienes, más fuerte (hasta el máximo). Clic, touch o barra espaciadora.</p>
  <div class="score"><span id="labelPts">Puntos</span> <span id="scoreN">0</span></div>
  <div class="bar-wrap" aria-hidden="true"><div class="bar" id="bar"></div></div>
  <div class="canvas-wrap">
    <canvas id="game" width="640" height="640" role="img" aria-label="Mini juego de canasta"></canvas>
  </div>
  <p class="lang">
    <a href="encestar.html" id="aEs">ES</a> · <a href="encestar.html?en" id="aEn">EN</a>
  </p>
<script>
(function () {
  const en = new URLSearchParams(location.search).has('en');
  const T = en ? {
    back: 'Home',
    title: 'HOOP',
    hint: 'Hold to build power, release to shoot. A quick tap is weak; the longer you hold, the stronger (up to max). Click, touch, or spacebar.',
    pts: 'Points',
  } : {
    back: 'Inicio',
    title: 'ENCESTAR',
    hint: 'Mantén para acumular fuerza; suelta para lanzar. Un toque corto tira suave, cuanto más mantienes, más fuerte (hasta el máximo). Clic, touch o barra espaciadora.',
    pts: 'Puntos',
  };
  document.getElementById('backLabel').textContent = T.back;
  document.getElementById('gameTitle').textContent = T.title;
  document.getElementById('gameHint').textContent = T.hint;
  document.getElementById('labelPts').textContent = T.pts;
  if (en) { document.documentElement.lang = 'en'; }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const g = 0.42;
  // Masa relativa: mayor → cae con más inercia (g efectivo menor)
  const ballMass = 1;
  const gBall = g / ballMass;
  // Lienzo 1:1; cancha, tablero y aro reescalados a la misma unidad
  const groundY = H - 50;
  const ballR = 14;
  const startX = 70;
  const startY = groundY - ballR;
  // Tiro: potencia 0..1 = tiempo manteniendo pulsado / CHARGE_MAX_MS (un toque corto = tiro suave, más tiempo = más fuerte)
  const angle = -1.15;
  const maxSpeed = 30;
  const CHARGE_MAX_MS = 680;
  const minShotPower = 0.04;
  // Aro: ancho interior ~1.4× el diámetro de la pelota (vista lateral)
  const innerRimW = ballR * 1.4 * 2;
  const RIM_T = 3;
  const backboardL = W - 86;
  const backboardW = 7;
  const backboardT = 243;
  const backboardB = 395;
  const backboardR = backboardL + backboardW;
  const rimY = 323;
  const rimR = backboardL - 8;
  const rimL = rimR - innerRimW;
  const rimCx = (rimL + rimR) * 0.5;
  // Red: boca = aro, abajo más estrecho
  const netD = 50;
  const yNetTop = rimY + RIM_T;
  const yNetBottom = yNetTop + netD;
  const netBotW = innerRimW * 0.28;
  const netBotL = rimCx - netBotW * 0.5;
  const netBotR = rimCx + netBotW * 0.5;
  // Soporte: derecha del tablero (+x)
  const poleW = 12;
  const poleL = backboardR + 26;
  const poleYTop = 225;
  const yArm = backboardB - 22;
  const ball = {
    x: startX, y: startY, vx: 0, vy: 0, active: false, scored: false,
    wasAboveRim: false,
    netAnim: null,
    spin: 0
  };
  let charge = 0;
  let charging = false;
  let pressT0 = 0;
  let score = 0;
  let raf = 0;
  let flightFrames = 0;
  const bar = document.getElementById('bar');
  const scoreN = document.getElementById('scoreN');
  const NET_JIGGLE_MAX = 20;
  let netJiggleT = 0;

  function lerpY(a, b, t) { return a + (b - a) * t; }

  function drawSceneBack() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    // Suelo
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, groundY, W, 3);
    ctx.fillStyle = '#1f1f1f';
    ctx.fillRect(0, groundY + 3, W, H - groundY - 3);
    // Soporte: poste vertical a la DERECHA del tablero (mayor x); altura > 0, de poleYTop al suelo
    ctx.fillStyle = '#4b5563';
    const poleH = groundY - poleYTop;
    if (poleH > 0) {
      const poleGr = ctx.createLinearGradient(poleL, poleYTop, poleL + poleW, groundY);
      poleGr.addColorStop(0, '#4b5563');
      poleGr.addColorStop(0.45, '#6b7280');
      poleGr.addColorStop(1, '#374151');
      ctx.fillStyle = poleGr;
      ctx.fillRect(poleL, poleYTop, poleW, poleH);
    }
    // Brazo horizontal: del reverso del tablero hacia el poste (derecha)
    const strutH = 6;
    if (poleL > backboardR) {
      ctx.fillStyle = '#4b5563';
      ctx.fillRect(backboardR, yArm, poleL - backboardR, strutH);
    }
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(poleL - 1, groundY, poleW + 2, 4);
    // Tablero
    ctx.fillStyle = '#e5e7eb';
    ctx.fillRect(backboardL, backboardT, backboardW, backboardB - backboardT);
    ctx.fillStyle = '#9ca3af';
    ctx.fillRect(backboardL, backboardT, 1, backboardB - backboardT);
    // Aro (proporcional a la pelota)
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = RIM_T;
    ctx.beginPath();
    ctx.moveTo(rimL, rimY);
    ctx.lineTo(rimR, rimY);
    ctx.stroke();
  }

  // Red encima de la pelota cuando esta atraviesa el aro (véase draw)
  function drawNet() {
    const e = netBallElastic();
    const y1e = e.y1, y2e = e.y2;
    const topL = rimL;
    const topR = rimR;
    const effBotL = e.botL, effBotR = e.botR;
    const jig = netJiggleT > 0
      ? (3.2 * (netJiggleT / NET_JIGGLE_MAX)) * Math.sin(netJiggleT * 0.7) : 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    const nStr = 6;
    for (let i = 0; i < nStr; i++) {
      const u = (i + 0.5) / nStr;
      const tx = lerpY(topL, topR, u);
      let bx2 = lerpY(effBotL, effBotR, u);
      bx2 += jig * (0.35 + 0.65 * Math.sin(u * Math.PI * 2));
      if (e.active) {
        const tAlong = (e.yS - y1e) / (y2e - y1e);
        const onChord = lerpY(tx, bx2, tAlong);
        const out = (u - 0.5) * 2;
        const midX = onChord + out * e.kink;
        ctx.beginPath();
        ctx.moveTo(tx, y1e);
        ctx.lineTo(midX, e.yS);
        ctx.lineTo(bx2, y2e);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(tx, y1e);
        ctx.lineTo(bx2, y2e);
        ctx.stroke();
      }
    }
    const yTopN = yNetTop, yBotN = yNetBottom;
    const nRow = 5, nCol = 6;
    const grid = [];
    const wBotE = effBotR - effBotL;
    function netX(r, c) {
      const t = r / nRow;
      const y = lerpY(yTopN, yBotN, t);
      const wTop = topR - topL;
      const w = wTop * (1 - t) + wBotE * t;
      const cx = rimCx;
      const u = c / nCol;
      return { x: cx - w * 0.5 + u * w, y: y };
    }
    for (let r = 0; r <= nRow; r++) {
      grid[r] = [];
      for (let c = 0; c <= nCol; c++) {
        const p = netX(r, c);
        grid[r][c] = p;
      }
    }
    for (let r = 0; r < nRow; r++) {
      for (let c = 0; c < nCol; c++) {
        const a = grid[r][c], b = grid[r][c + 1], d = grid[r + 1][c], e = grid[r + 1][c + 1];
        if (!a || !b || !d || !e) continue;
        const sh = netJiggleT > 0
          ? 0.55 * (netJiggleT / NET_JIGGLE_MAX) * Math.sin((r + c) * 0.9 + netJiggleT * 0.12) : 0;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(e.x + sh, e.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(d.x + sh, d.y);
        ctx.stroke();
      }
    }
  }

  function ballShouldRenderBehindNet() {
    if (ball.netAnim) return true;
    if (!ball.active) return false;
    const bx = ball.x, by = ball.y;
    const horiz = bx + ballR > rimL - 4 && bx - ballR < rimR + 4;
    const pastRim = by + ballR > rimY - 2;
    const inNetColumn = by - ballR < yNetBottom + 12;
    return horiz && pastRim && inNetColumn;
  }

  /** Cede elásticamente: se ensancha la boca baja y los hilos se corven al paso del balón. */
  function netBallElastic() {
    const y1 = rimY + RIM_T, y2 = y1 + netD;
    const def = {
      active: false,
      botL: netBotL,
      botR: netBotR,
      yS: (y1 + y2) * 0.5,
      kink: 0,
      y1, y2
    };
    if (!ball.netAnim && !ballShouldRenderBehindNet()) return def;
    const by = ball.y;
    const tDepth = Math.max(0, Math.min(1, (by - y1) / netD));
    const narrowW = netBotR - netBotL;
    const minClearW = 2 * ballR + 24;
    const open = 1 - Math.pow(1 - tDepth, 1.4);
    const wBotE = lerpY(narrowW, Math.max(narrowW, minClearW), open);
    const botL = rimCx - wBotE * 0.5, botR = rimCx + wBotE * 0.5;
    const yS = Math.max(y1 + 2, Math.min(by, y2 - 2));
    const kink = 3.5 + 12 * tDepth * (0.4 + 0.6 * open);
    return { active: true, botL, botR, yS, kink, y1, y2 };
  }

  // Misma integración que el tiro: vy += gBall, x += vx, y += vy
  function buildAimTrajectory(power) {
    const s = maxSpeed * Math.max(minShotPower, Math.min(1, power));
    const vx = Math.cos(angle) * s;
    let vy = Math.sin(angle) * s;
    let x = startX;
    let y = startY;
    const full = [{ x, y }];
    const maxIter = 500;
    for (let i = 0; i < maxIter; i++) {
      vy += gBall;
      x += vx;
      y += vy;
      if (y + ballR > groundY) break;
      full.push({ x, y });
    }
    return full;
  }

  // Origen (0, groundY) = pared · suelo. Eje X = suelo; eje Y = pared izquierda.
  function drawAimRefAxes() {
    const xLen = Math.min(300, W - 1);
    const yLen = Math.min(groundY - 8, 320);
    ctx.save();
    ctx.strokeStyle = 'rgba(200, 210, 220, 0.5)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(xLen, groundY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(0, groundY - yLen);
    ctx.stroke();
    ctx.restore();
  }

  // Parábola en el plano (distancia a la pared, altura) = (x, groundY - y): trazo completo hasta suelo
  function drawAimHint() {
    const p = Math.max(minShotPower, Math.min(1, charge));
    const full = buildAimTrajectory(p);
    if (full.length < 2) return;
    drawAimRefAxes();
    const last = full[full.length - 1];
    ctx.save();
    ctx.setLineDash([4, 7]);
    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
    ctx.lineWidth = 1.45;
    ctx.beginPath();
    ctx.moveTo(full[0].x, full[0].y);
    for (let j = 1; j < full.length; j++) ctx.lineTo(full[j].x, full[j].y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(last.x, last.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBall() {
    const bx = ball.active || ball.netAnim ? ball.x : startX;
    const by = ball.active || ball.netAnim ? ball.y : startY;
    const r = ballR;
    const inFlight = ball.active || ball.netAnim;
    ctx.save();
    ctx.translate(bx, by);
    if (inFlight) ctx.rotate(ball.spin);
    const grd = ctx.createRadialGradient(-4, -4, 2, 0, 0, r);
    grd.addColorStop(0, '#fdba74');
    grd.addColorStop(1, '#ea580c');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, r - 0.3, 0, Math.PI * 2);
    ctx.clip();
    ctx.strokeStyle = 'rgba(32, 12, 5, 0.92)';
    ctx.lineWidth = 1.15;
    ctx.lineCap = 'round';
    const k = 0.88;
    ctx.beginPath();
    ctx.moveTo(-r * k, 0);
    ctx.lineTo(r * k, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-r * 0.2, -r * 0.72);
    ctx.bezierCurveTo(
      -r * 0.7, -r * 0.25,
      -r * 0.5, r * 0.35,
      -r * 0.1, r * 0.7
    );
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r * 0.2, -r * 0.72);
    ctx.bezierCurveTo(
      r * 0.7, -r * 0.25,
      r * 0.5, r * 0.35,
      r * 0.1, r * 0.7
    );
    ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(bx, by);
    if (inFlight) ctx.rotate(ball.spin);
    ctx.strokeStyle = 'rgba(0,0,0,0.32)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function resetBall() {
    if (raf) {
      cancelAnimationFrame(raf);
      raf = 0;
    }
    ball.x = startX;
    ball.y = startY;
    ball.vx = 0;
    ball.vy = 0;
    ball.active = false;
    ball.scored = false;
    ball.wasAboveRim = false;
    ball.netAnim = null;
    ball.spin = 0;
    charge = 0;
    flightFrames = 0;
    bar.style.width = '0%';
    if (netJiggleT > 0) {
      raf = requestAnimationFrame(tick);
    }
  }

  function resolveBackboard() {
    if (!ball.active || ball.netAnim) return;
    const l = backboardL, t = backboardT, r = backboardL + backboardW, b = backboardB;
    const x = ball.x, y = ball.y, R = ballR;
    let qx = x, qy = y;
    if (qx < l) qx = l;
    else if (qx > r) qx = r;
    if (qy < t) qy = t;
    else if (qy > b) qy = b;
    const dx = x - qx, dy = y - qy;
    const d2 = dx * dx + dy * dy;
    if (d2 > R * R) return;
    if (d2 < 1e-4) {
      const dL = x - l, dR = r - x, dT = y - t, dB = b - y;
      const m = Math.min(dL, dR, dT, dB);
      if (m === dL) { ball.x = l - R - 0.2; if (ball.vx > 0) ball.vx *= -0.6; return; }
      if (m === dR) { ball.x = r + R + 0.2; if (ball.vx < 0) ball.vx *= -0.6; return; }
      if (m === dT) { ball.y = t - R - 0.2; if (ball.vy > 0) ball.vy *= -0.5; return; }
      ball.y = b + R + 0.2; if (ball.vy < 0) ball.vy *= -0.5; return;
    }
    const d = Math.sqrt(d2);
    const nx = dx / d, ny = dy / d;
    const o = R - d;
    ball.x += nx * o;
    ball.y += ny * o;
    const vn = ball.vx * nx + ball.vy * ny;
    if (vn < 0) {
      ball.vx = (ball.vx - 2 * vn * nx) * 0.62;
      ball.vy = (ball.vy - 2 * vn * ny) * 0.62;
    }
  }

  function resolveRim(prevY) {
    if (!ball.active || ball.netAnim) return;
    const py = prevY !== undefined ? prevY : ball.y;
    const prevB = py + ballR;
    const newB = ball.y + ballR;
    // Baja a través del plano del aro: no rebotar (cruce en un frame + holgura en x)
    if (
      ball.vy > 0.04 &&
      prevB < rimY + 0.5 && newB >= rimY - 1.5 &&
      ball.x + ballR > rimL - 2 && ball.x - ballR < rimR + 2
    ) {
      const yLo = ball.y - ballR, yHi = ball.y + ballR;
      if (yLo < yNetBottom + 6 && yHi > rimY - 3) return;
    }
    // Pasa de arriba hacia canasta: no rebotar en el aro
    if (
      ball.wasAboveRim &&
      ball.vy > 0.08 &&
      ball.x + ballR > rimL + 2 &&
      ball.x - ballR < rimR - 2
    ) {
      const yLo = ball.y - ballR, yHi = ball.y + ballR;
      if (yLo < rimY + 8 && yHi > rimY - 2) return;
    }
    if (ball.x + ballR < rimL - 2 || ball.x - ballR > rimR + 2) return;
    const bandT = rimY - 2, bandB = rimY + 6;
    if (ball.y + ballR < bandT || ball.y - ballR > bandB) return;
    if (ball.vy > 0.15) {
      ball.y = bandT - ballR - 0.2;
      ball.vy *= -0.4;
      ball.vx *= 0.9;
    } else if (ball.vy < -0.2 && ball.y - ballR < bandB) {
      ball.y = bandB + ballR + 0.2;
      ball.vy *= -0.45;
    }
  }

  function tick() {
    if (netJiggleT > 0) netJiggleT--;
    if (charging) {
      const elapsed = performance.now() - pressT0;
      charge = Math.min(1, elapsed / CHARGE_MAX_MS);
      bar.style.width = (charge * 100) + '%';
    }
    if (ball.netAnim) {
      const na = ball.netAnim;
      na.t = (na.t || 0) + 1;
      const u = Math.min(1, na.t / na.dur);
      const e = 1 - (1 - u) * (1 - u);
      ball.x = na.sx + (na.ex - na.sx) * e;
      ball.y = na.sy + (na.ey - na.sy) * e;
      ball.spin += 0.19;
      if (u >= 1) {
        ball.netAnim = null;
        ball.wasAboveRim = false;
        resetBall();
        draw();
        if (charging) raf = requestAnimationFrame(tick);
        return;
      }
      draw();
      raf = requestAnimationFrame(tick);
      return;
    }
    if (ball.active) {
      const prevY = ball.y;
      const prevBottom = prevY + ballR;
      if (
        ball.y + ballR < rimY - 2 &&
        ball.x - ballR > rimL + 3 &&
        ball.x + ballR < rimR - 3
      ) {
        ball.wasAboveRim = true;
      }
      ball.vy += gBall;
      ball.x += ball.vx;
      ball.y += ball.vy;
      const newBottom = ball.y + ballR;
      let throughNet = false;
      if (!ball.scored && !ball.netAnim) {
        const horizOpen = ball.x + ballR > rimL - 2 && ball.x - ballR < rimR + 2;
        const falling = ball.vy > 0.04;
        const crossRimPlane = prevBottom < rimY + 0.5 && newBottom >= rimY - 1.5;
        const inHoopWindow =
          newBottom > rimY - 2 &&
          ball.y - ballR < yNetBottom + 4;
        const legacyBand =
          ball.wasAboveRim &&
          falling && horizOpen &&
          newBottom >= rimY - 1 &&
          newBottom < rimY + 48 &&
          ball.y - ballR < rimY + 22;
        if (horizOpen && falling && inHoopWindow && (crossRimPlane || legacyBand)) {
          throughNet = true;
          ball.scored = true;
          score += 1;
          scoreN.textContent = String(score);
          netJiggleT = NET_JIGGLE_MAX;
          ball.netAnim = {
            t: 0,
            dur: 44,
            sx: ball.x,
            sy: ball.y,
            ex: rimCx,
            ey: yNetBottom - ballR * 0.25
          };
          ball.vx = 0;
          ball.vy = 0;
        }
      }
      if (!throughNet) {
        for (let s = 0; s < 2; s++) {
          resolveRim(prevY);
          resolveBackboard();
        }
      }
      // Rotación en vuelo: más rápida cuanto más velocidad (efecto backspin)
      {
        const sp = Math.hypot(ball.vx, ball.vy);
        ball.spin += 0.045 + 0.0072 * sp;
      }
      flightFrames++;
      if (flightFrames > 520) {
        resetBall();
        draw();
        return;
      }
      if (ball.y + ballR > groundY) {
        ball.y = groundY - ballR;
        if (ball.vy > 0) ball.vy *= -0.5;
        ball.vx *= 0.9;
        if (Math.abs(ball.vy) < 0.4) ball.vy = 0;
        if (Math.abs(ball.vx) < 0.2) ball.vx = 0;
      }
      if (
        ball.y + ballR >= groundY - 0.5 &&
        Math.abs(ball.vx) < 0.11 &&
        Math.abs(ball.vy) < 0.11
      ) {
        resetBall();
        draw();
        return;
      }
      if (ball.x - ballR > W + 40 || ball.x + ballR < -40 || ball.y - ballR > H + 20) {
        resetBall();
        draw();
        return;
      }
      if (throughNet) {
        draw();
        raf = requestAnimationFrame(tick);
        return;
      }
    } else {
      flightFrames = 0;
    }
    draw();
    if (charging || ball.active || ball.netAnim || netJiggleT > 0) {
      raf = requestAnimationFrame(tick);
    } else {
      raf = 0;
    }
  }

  function draw() {
    drawSceneBack();
    if (ballShouldRenderBehindNet()) {
      drawBall();
      drawNet();
    } else {
      drawNet();
      if (charging && !ball.active && !ball.netAnim) drawAimHint();
      drawBall();
    }
  }

  function startCharge() {
    if (ball.netAnim) return;
    if (ball.active) return;
    if (charging) return;
    charging = true;
    pressT0 = performance.now();
    if (!raf) raf = requestAnimationFrame(tick);
  }

  function releaseShot() {
    if (!charging || ball.active) return;
    const elapsed = performance.now() - pressT0;
    const power = Math.max(minShotPower, Math.min(1, elapsed / CHARGE_MAX_MS));
    charging = false;
    bar.style.width = '0%';
    const s = maxSpeed * power;
    ball.vx = Math.cos(angle) * s;
    ball.vy = Math.sin(angle) * s;
    ball.x = startX;
    ball.y = startY;
    ball.wasAboveRim = false;
    ball.netAnim = null;
    ball.spin = 0;
    ball.active = true;
    ball.scored = false;
    if (!raf) raf = requestAnimationFrame(tick);
  }

  canvas.addEventListener('mousedown', (e) => { e.preventDefault(); startCharge(); });
  window.addEventListener('mouseup', (e) => { if (charging) releaseShot(); });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startCharge(); }, { passive: false });
  window.addEventListener('touchend', (e) => { if (charging) releaseShot(); });
  let spaceDown = false;
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !spaceDown) {
      e.preventDefault();
      spaceDown = true;
      startCharge();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      spaceDown = false;
      if (charging) releaseShot();
    }
  });

  draw();
})();
</script>
</body>
</html>
